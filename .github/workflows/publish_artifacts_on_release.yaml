# When a new release is created, publish artifacts to Maven Central / JetBrains Marketplace / etc..
#
# About secrets used here:
# 1. OSSRH_USERNAME, OSSRH_TOKEN: token obtained from https://oss.sonatype.org/
# 2. OSSRH_GPG_SECRET_KEY - private key for signing Maven artifacts
# 3. OSSRH_GPG_SECRET_KEY_PASSWORD - password for unlocking OSSRH_GPG_SECRET_KEY
# 4. JETBRAINS_MARKETPLACE_TOKEN - token obtained from https://plugins.jetbrains.com/author/me/tokens

name: Publish package to Maven Central and JetBrains Marketplace
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true
        type: string
jobs:
  publish_ide_plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.events.release.tag_name || inputs.release_tag || github.ref }}

      - name: Publish IntelliJ plugin to JetBrains Marketplace
        run: ./gradlew :idea_plugin:publishPlugin --stacktrace --no-daemon
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}

  publish_maven_artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.events.release.tag_name || inputs.release_tag || github.ref }}

      - id: install-secret-key
        name: Install gpg secret key
        run: |
          cat <(echo -e "${{ secrets.OSSRH_GPG_SECRET_KEY }}") | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - id: publish-to-central
        name: Publish to Maven Central Repository
        env:
          SIGN_BUILD: true
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
        run: |
          ./gradlew :ktfmt:publish closeAndReleaseStagingRepositories \
              --stacktrace \
              --no-daemon \
              -Psigning.gnupg.passphrase="$GPG_PASSPHRASE"

  upload_github_artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.events.release.tag_name || inputs.release_tag || github.ref }}

      - name: Debug release tag
        run: |
          echo "Release tag: ${{ github.events.release.tag_name || inputs.release_tag }}"

      - name: Build JAR artifacts
        run: ./gradlew :ktfmt:jar :ktfmt:shadowJar --stacktrace --no-daemon

      - name: Verify JAR artifacts exist
        run: ls -la core/build/libs/ktfmt-*.jar

      - name: Upload JAR artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.events.release.tag_name || inputs.release_tag }}
          files: |
            core/build/libs/ktfmt-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the GraalVM native binary per platform and attach it to the GitHub Release. Modeled on
  # google-java-format's release workflow. Uses GraalVM Community (Serial GC only, which matches the
  # build's default) so there are no Oracle GraalVM licensing considerations.
  upload_native_binaries:
    name: Native binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required to upload release assets
    strategy:
      fail-fast: false
      matrix:
        # Build linux on the oldest available ubuntu for broader glibc compatibility. Keep the keys
        # of the SUFFIX map below in sync with this list.
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-latest, windows-latest]
    env:
      SUFFIX: ${{ fromJson('{"ubuntu-22.04":"linux-x86-64","ubuntu-22.04-arm":"linux-arm64","macos-latest":"darwin-arm64","windows-latest":"windows-x86-64"}')[matrix.os] }}
      EXTENSION: ${{ matrix.os == 'windows-latest' && '.exe' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.events.release.tag_name || inputs.release_tag || github.ref }}

      # Gradle runs on JDK 17; native-image is provided via GRAALVM_HOME (set-java-home: false).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          set-java-home: 'false'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./gradlew :ktfmt:nativeCompile -Pktfmt.native.release=true --stacktrace --no-daemon

      - name: Smoke test
        shell: bash
        run: ./native_smoke_test.sh

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p release
          cp "core/build/native/nativeCompile/ktfmt${EXTENSION}" "release/ktfmt_${SUFFIX}${EXTENSION}"

      - name: Upload native binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.events.release.tag_name || inputs.release_tag }}
          files: release/ktfmt_${{ env.SUFFIX }}${{ env.EXTENSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.events.release.tag_name || inputs.release_tag || github.ref }}

      - uses: actions/setup-node@v4

      - name: Deploy website
        run: |
          KTFMT_TMP_DIR=$(mktemp -d)

          pushd website
          npm install .
          KTFMT_WEBSITE_OUTPUT_DIR="$KTFMT_TMP_DIR" gulp build-website
          popd

          git fetch
          git checkout gh-pages
          git config user.email ktfmt@facebook.com
          git config user.name ktfmt

          rm -rf *
          cp -R "$KTFMT_TMP_DIR"/* .

          git add .
          git commit -m "Publish website"
          git push --force

          rm -rf "$KTFMT_TMP_DIR"
