# Builds and attaches release artifacts to a GitHub Release (klimat fork).
#
# The artifact version is derived from the release tag: tag `v0.65-klimat.1`
# produces artifacts versioned `0.65-klimat.1`. No external secrets are needed —
# everything publishes to the GitHub Release itself via the built-in GITHUB_TOKEN.
#
# Attached artifacts:
# 1. ktfmt-<version>.jar and ktfmt-<version>-with-dependencies.jar (CLI fat jar)
# 2. ktfmt-<version>-<os>-<arch> native binaries (GraalVM: linux x86_64/aarch64, macos aarch64)
# 3. IntelliJ plugin zip, installable via Settings > Plugins > Install Plugin from Disk

name: Publish release artifacts
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

jobs:
  upload_jars:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Build JAR artifacts
        run: ./gradlew :ktfmt:jar :ktfmt:shadowJar "-Pktfmt.version=${RELEASE_TAG#v}" --stacktrace --no-daemon

      - name: Upload JAR artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            core/build/libs/ktfmt-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_ide_plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Build IntelliJ plugin
        run: ./gradlew :idea_plugin:buildPlugin "-Pktfmt.version=${RELEASE_TAG#v}" --stacktrace --no-daemon

      - name: Upload IntelliJ plugin to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ktfmt_idea_plugin/build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_native_images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: linux-aarch64
          - os: macos-latest
            artifact: darwin-aarch64
    name: Native image ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required to upload release assets
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      # set-java-home is intentionally 'false': the JVM build runs on Zulu while GRAALVM_HOME
      # points the GraalVM Gradle plugin at the native-image toolchain (same setup as CI).
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.1'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          set-java-home: 'false'
          native-image-job-reports: 'true'

      - name: Build native image
        run: ./gradlew :ktfmt:nativeCompile "-Pktfmt.version=${RELEASE_TAG#v}" -Pktfmt.native.release=true --stacktrace --no-daemon

      - name: Smoke test native image
        run: ./native_smoke_test.sh

      # Apple Silicon refuses to exec a binary with no code signature (SIGKILL).
      # GraalVM ad-hoc signs on build, but re-sign explicitly so the uploaded
      # bytes are guaranteed valid. Ad-hoc ("-") needs no certificate; Homebrew
      # installs formulae without quarantine, so no notarization is required.
      - name: Ad-hoc codesign the macOS binary
        if: matrix.artifact == 'darwin-aarch64'
        run: codesign --force --sign - core/build/native/nativeCompile/ktfmt

      - name: Rename binary with version and platform
        run: cp core/build/native/nativeCompile/ktfmt "ktfmt-${RELEASE_TAG#v}-${{ matrix.artifact }}"

      - name: Upload native binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ktfmt-*-${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After all assets are uploaded, tell the Homebrew tap to bump its formula.
  # Requires a repo secret TAP_DISPATCH_TOKEN: a PAT with contents:write on
  # simonvar/homebrew-tap (GITHUB_TOKEN cannot dispatch across repositories).
  # If the secret is absent the step no-ops so the release still succeeds.
  bump_homebrew_tap:
    name: Bump Homebrew tap
    needs: [upload_jars, build_native_images]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger formula bump in simonvar/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "TAP_DISPATCH_TOKEN not set — skipping Homebrew tap bump."
            exit 0
          fi
          printf '{"event_type":"ktfmt-release","client_payload":{"tag":"%s"}}' "$RELEASE_TAG" \
            | gh api --method POST repos/simonvar/homebrew-tap/dispatches --input -
