name: Build and Test

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # test against relevant LTS versions of Java
        java: [ 17, 21 ]
    name: Build ktfmt on Java ${{ matrix.java }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: zulu
    - name: Build ktfmt_idea_plugin
      run: ./gradlew :idea_plugin:build --stacktrace --no-daemon
    - name: Build the Online Formatter
      run: ./gradlew :lambda:build --stacktrace --no-daemon
    - name: Build ktfmt
      run: ./gradlew :ktfmt:build --stacktrace --no-daemon

  native:
    # The native image is independent of the JVM test matrix above, so it builds once in its own job
    # rather than once per Java version. TODO(#15): expand to a macOS/Windows + architecture matrix
    # once multi-platform release infrastructure moves to Meta-owned CI.
    runs-on: ubuntu-latest
    name: Build Native Image
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # Gradle itself runs on the project's JDK (17); native-image is provided separately below via
    # GRAALVM_HOME (set-java-home: false keeps JAVA_HOME pointed at the JDK above).
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: zulu
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        set-java-home: 'false'
        native-image-job-reports: 'true'
    - name: Build
      run: ./gradlew :ktfmt:nativeCompile --stacktrace --no-daemon
    - name: Smoke test
      shell: bash
      run: |
        set -euo pipefail
        bin=./core/build/native/nativeCompile/ktfmt
        "$bin" --version
        # Exercise the parser/formatter on representative constructs (enum/class/lambda), which is
        # the reflection-heavy path that a bare `--version` check would miss.
        sample=$'enum class E { A, B }\nclass Foo(val a: Int) { fun bar() = listOf(1, 2).map { it * 2 } }'
        formatted="$(printf '%s\n' "$sample" | "$bin" -)"
        printf '%s\n' "$formatted"
        [[ -n "$formatted" ]] || { echo 'native ktfmt produced no output'; exit 1; }
        # Idempotency: re-formatting the output must be a no-op.
        reformatted="$(printf '%s\n' "$formatted" | "$bin" -)"
        [[ "$formatted" = "$reformatted" ]] || { echo 'native ktfmt output is not idempotent'; exit 1; }
