name: Build and Test

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # test against relevant LTS versions of Java
        java: [ 17, 21 ]
    name: Build ktfmt on Java ${{ matrix.java }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: zulu
    - name: Build ktfmt_idea_plugin
      run: ./gradlew :idea_plugin:build --stacktrace --no-daemon
    - name: Build the Online Formatter
      run: ./gradlew :lambda:build --stacktrace --no-daemon
    - name: Build ktfmt
      run: ./gradlew :ktfmt:build --stacktrace --no-daemon

  native:
    # Native builds run across platforms and are non-blocking: a GraalVM/toolchain hiccup on one OS
    # shouldn't fail the whole CI run. The shippable release binaries are built separately, see
    # publish_artifacts_on_release.yaml. Build on the oldest available ubuntu for broader glibc
    # compatibility of the linux binary.
    name: Native Image on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # Gradle runs on the project's JDK (17); native-image is provided separately via GRAALVM_HOME
    # (set-java-home: false keeps JAVA_HOME pointed at the JDK above).
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: zulu

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm-community'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        set-java-home: 'false'
        native-image-job-reports: 'true'

    - name: Build
      shell: bash
      run: ./gradlew :ktfmt:nativeCompile --stacktrace --no-daemon

    - name: Smoke test
      shell: bash
      run: ./native_smoke_test.sh
